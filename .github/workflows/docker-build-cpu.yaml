name: Build and Push CPU Image (Local/Minikube)

on:
  push:
    branches: [master, main]
    paths:
      - "api/**"
      - "docker/Dockerfile.cpu"
      - ".github/workflows/docker-build-cpu.yaml"
  workflow_dispatch:

env:
  DOCKER_HUB_USERNAME: astitvaveergarg
  IMAGE_NAME: astitvaveergarg/vision-api

jobs:
  build-and-push-cpu:
    name: Build CPU-Only Image
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Free disk space
        run: |
          echo "Disk before cleanup:"
          df -h /
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache/CodeQL
          sudo apt-get clean
          docker system prune -af || true
          echo "Disk after cleanup:"
          df -h /

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}

      - name: Build and push CPU image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile.cpu
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:cpu-latest
            ${{ env.IMAGE_NAME }}:cpu-${{ github.ref_name }}
            ${{ env.IMAGE_NAME }}:cpu-${{ github.ref_name }}-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Image size report
        run: |
          docker pull ${{ env.IMAGE_NAME }}:cpu-latest
          docker images ${{ env.IMAGE_NAME }}:cpu-latest --format "CPU Image size: {{.Size}}"
