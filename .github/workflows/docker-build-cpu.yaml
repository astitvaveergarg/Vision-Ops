name: Build and Push CPU Image (Local/Minikube)

on:
  push:
    branches: [master, main]
    paths:
      - "api/**"
      - "docker/Dockerfile.cpu"
      - ".github/workflows/docker-build-cpu.yaml"
  workflow_dispatch:

env:
  IMAGE_NAME: vision-api

jobs:
  build-and-push-cpu:
    name: Build and Push CPU-Only Image
    runs-on: ubuntu-latest

    steps:
      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /opt/ghc
          sudo rm -rf /usr/local/share/boost
          sudo rm -rf "$AGENT_TOOLSDIRECTORY"
          sudo docker system prune -af
          df -h

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=cpu-latest,enable={{is_default_branch}}
            type=ref,event=branch,prefix=cpu-
            type=sha,prefix=cpu-{{branch}}-

      - name: Build and push CPU image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile.cpu
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64

      - name: Image URL
        run: |
          echo "✅ CPU image pushed successfully!"
          echo "Pull command:"
          echo "docker pull ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:cpu-latest"

      - name: Image size report
        run: |
          docker pull ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:cpu-latest
          echo "📦 Image Size Report:"
          docker images ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:cpu-latest --format "  Repository : {{.Repository}}"
          docker images ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:cpu-latest --format "  Tag        : {{.Tag}}"
          docker images ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:cpu-latest --format "  Size       : {{.Size}}"
