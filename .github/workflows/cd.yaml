name: CD - Deploy to Kubernetes

on:
  workflow_run:
    workflows: ["CI - Build and Test"]
    types:
      - completed
    branches: [main]

  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy to'
        required: true
        type: choice
        options:
          - dev
          - staging
          - prod
      image_tag:
        description: 'Image tag to deploy'
        required: true
        default: 'latest'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  deploy-dev:
    name: Deploy to Development
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'dev' ||
      github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success'
    environment:
      name: development
      url: http://dev.visionops.local

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up kubectl
      uses: azure/setup-kubectl@v3
      with:
        version: 'v1.28.0'

    - name: Set up Helm
      uses: azure/setup-helm@v3
      with:
        version: 'v3.13.0'

    - name: Configure kubectl
      run: |
        mkdir -p ~/.kube
        echo "${{ secrets.KUBE_CONFIG_DEV }}" | base64 -d > ~/.kube/config
        kubectl config use-context dev-cluster

    - name: Deploy with Helm
      run: |
        helm upgrade --install vision-api ./charts/api \
          --namespace vision-app \
          --create-namespace \
          --values ./charts/api/values-dev.yaml \
          --set image.repository=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }} \
          --set image.tag=${{ github.event.inputs.image_tag || 'latest' }} \
          --wait \
          --timeout 5m

    - name: Verify deployment
      run: |
        kubectl rollout status deployment/vision-api -n vision-app --timeout=5m
        kubectl get pods -n vision-app -l app=vision-api

    - name: Run smoke tests
      run: |
        API_URL=$(kubectl get svc vision-api -n vision-app -o jsonpath='{.status.loadBalancer.ingress[0].ip}')
        curl -f http://${API_URL}/health || exit 1
        echo "✅ Deployment successful and health check passed"

  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'staging'
    needs: []
    environment:
      name: staging
      url: http://staging.visionops.com

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up kubectl
      uses: azure/setup-kubectl@v3
      with:
        version: 'v1.28.0'

    - name: Set up Helm
      uses: azure/setup-helm@v3
      with:
        version: 'v3.13.0'

    - name: Configure kubectl
      run: |
        mkdir -p ~/.kube
        echo "${{ secrets.KUBE_CONFIG_STAGING }}" | base64 -d > ~/.kube/config
        kubectl config use-context staging-cluster

    - name: Deploy with Helm
      run: |
        helm upgrade --install vision-api ./charts/api \
          --namespace vision-app \
          --create-namespace \
          --values ./charts/api/values-staging.yaml \
          --set image.repository=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }} \
          --set image.tag=${{ github.event.inputs.image_tag }} \
          --wait \
          --timeout 10m

    - name: Verify deployment
      run: |
        kubectl rollout status deployment/vision-api -n vision-app --timeout=10m
        kubectl get pods -n vision-app -l app=vision-api

    - name: Run integration tests
      run: |
        API_URL=$(kubectl get svc vision-api -n vision-app -o jsonpath='{.status.loadBalancer.ingress[0].hostname}')
        curl -f http://${API_URL}/health || exit 1
        # Add more comprehensive tests here
        echo "✅ Staging deployment successful"

  deploy-prod:
    name: Deploy to Production
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'prod'
    needs: []
    environment:
      name: production
      url: https://api.visionops.com

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up kubectl
      uses: azure/setup-kubectl@v3
      with:
        version: 'v1.28.0'

    - name: Set up Helm
      uses: azure/setup-helm@v3
      with:
        version: 'v3.13.0'

    - name: Configure kubectl
      run: |
        mkdir -p ~/.kube
        echo "${{ secrets.KUBE_CONFIG_PROD }}" | base64 -d > ~/.kube/config
        kubectl config use-context prod-cluster

    - name: Deploy with Helm (Blue-Green)
      run: |
        # Deploy to green environment first
        helm upgrade --install vision-api-green ./charts/api \
          --namespace vision-app \
          --create-namespace \
          --values ./charts/api/values-prod.yaml \
          --set image.repository=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }} \
          --set image.tag=${{ github.event.inputs.image_tag }} \
          --set nameOverride=vision-api-green \
          --wait \
          --timeout 15m

    - name: Verify green deployment
      run: |
        kubectl rollout status deployment/vision-api-green -n vision-app --timeout=15m
        kubectl get pods -n vision-app -l app=vision-api-green

    - name: Run production smoke tests
      run: |
        # Test green deployment
        GREEN_IP=$(kubectl get svc vision-api-green -n vision-app -o jsonpath='{.spec.clusterIP}')
        kubectl run test-pod --rm -i --restart=Never --image=curlimages/curl -- \
          curl -f http://${GREEN_IP}:8000/health || exit 1
        echo "✅ Green deployment health check passed"

    - name: Switch traffic to green (Blue-Green cutover)
      run: |
        # Update service selector to point to green
        kubectl patch service vision-api -n vision-app -p '{"spec":{"selector":{"version":"green"}}}'
        echo "Traffic switched to green deployment"
        
    - name: Monitor for 5 minutes
      run: |
        echo "Monitoring new deployment..."
        sleep 300
        # Check error rates, latency, etc.
        kubectl logs -n vision-app -l app=vision-api-green --tail=100

    - name: Cleanup old blue deployment
      run: |
        helm uninstall vision-api-blue -n vision-app || echo "No blue deployment to cleanup"
        echo "✅ Production deployment successful"

  notify:
    name: Send Notifications
    runs-on: ubuntu-latest
    needs: [deploy-dev, deploy-staging, deploy-prod]
    if: always()
    
    steps:
    - name: Send Slack notification
      uses: slackapi/slack-github-action@v1.25.0
      with:
        webhook: ${{ secrets.SLACK_WEBHOOK }}
        payload: |
          {
            "text": "VisionOps Deployment ${{ needs.deploy-dev.result || needs.deploy-staging.result || needs.deploy-prod.result }}",
            "blocks": [
              {
                "type": "section",
                "text": {
                  "type": "mrkdwn",
                  "text": "*VisionOps Deployment*\n*Status:* ${{ needs.deploy-dev.result || needs.deploy-staging.result || needs.deploy-prod.result }}\n*Environment:* ${{ github.event.inputs.environment || 'dev' }}\n*Image Tag:* ${{ github.event.inputs.image_tag || 'latest' }}\n*Triggered by:* ${{ github.actor }}"
                }
              }
            ]
          }
      continue-on-error: true
