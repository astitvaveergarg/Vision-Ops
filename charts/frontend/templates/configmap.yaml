apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "vision-frontend.fullname" . }}-nginx
  labels:
    {{- include "vision-frontend.labels" . | nindent 4 }}
data:
  nginx.conf: |
    server {
        listen 80;
        server_name _;

        client_max_body_size {{ .Values.nginx.maxBodySize | default "100m" }};

        root /usr/share/nginx/html;
        index index.html;

        # Serve static frontend files
        location / {
            try_files $uri $uri/ /index.html;
        }

        # Proxy API requests to backend service
        location /api/ {
            proxy_pass http://{{ .Values.backend.service }}:{{ .Values.backend.port }}/;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_cache_bypass $http_upgrade;
            proxy_read_timeout {{ .Values.nginx.readTimeout | default "300s" }};
            proxy_send_timeout {{ .Values.nginx.readTimeout | default "300s" }};

            add_header 'Access-Control-Allow-Origin' '*' always;
            add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS' always;
            add_header 'Access-Control-Allow-Headers' 'Content-Type' always;
        }

        gzip on;
        gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;
    }
