# Prometheus Stack - Production Environment

prometheus:
  prometheusSpec:
    retention: 30d
    replicas: 2
    storageSpec:
      volumeClaimTemplate:
        spec:
          storageClassName: premium-rwo
          resources:
            requests:
              storage: 100Gi
    resources:
      requests:
        cpu: 500m
        memory: 2Gi
      limits:
        cpu: 2000m
        memory: 8Gi
    podAntiAffinity: "hard"

grafana:
  enabled: true
  replicas: 2
  adminPassword: null
  admin:
    existingSecret: "vision-grafana-credentials"
    userKey: "admin-user"
    passwordKey: "admin-password"
  persistence:
    enabled: true
    storageClassName: premium-rwo
    size: 10Gi
  ingress:
    enabled: true
    ingressClassName: nginx
    annotations:
      cert-manager.io/cluster-issuer: "letsencrypt-prod"
      nginx.ingress.kubernetes.io/auth-type: basic
      nginx.ingress.kubernetes.io/auth-secret: grafana-basic-auth
    hosts:
      - grafana.vision.example.com
    tls:
      - secretName: grafana-prod-tls
        hosts:
          - grafana.vision.example.com
  resources:
    limits:
      cpu: 500m
      memory: 512Mi
    requests:
      cpu: 100m
      memory: 128Mi

alertmanager:
  enabled: true
  alertmanagerSpec:
    replicas: 3
    storage:
      volumeClaimTemplate:
        spec:
          storageClassName: premium-rwo
          resources:
            requests:
              storage: 10Gi
    podAntiAffinity: "hard"

nodeExporter:
  enabled: true

kubeStateMetrics:
  enabled: true

prometheusOperator:
  resources:
    limits:
      cpu: 200m
      memory: 200Mi
    requests:
      cpu: 100m
      memory: 100Mi
