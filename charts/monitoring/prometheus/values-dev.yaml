# Prometheus Stack - Development Environment

prometheus:
  prometheusSpec:
    retention: 2d  # Reduced from 7d → saves storage
    storageSpec:
      volumeClaimTemplate:
        spec:
          storageClassName: standard
          resources:
            requests:
              storage: 5Gi  # Reduced from 20Gi
    resources:
      requests:
        cpu: 100m  # Reduced from 200m
        memory: 256Mi  # Reduced from 512Mi
      limits:
        cpu: 500m
        memory: 1Gi

grafana:
  enabled: true
  adminPassword: null  # loaded from secret below
  admin:
    existingSecret: "vision-grafana-credentials"
    userKey: "admin-user"
    passwordKey: "admin-password"
  persistence:
    enabled: true
    storageClassName: standard
    size: 5Gi
  ingress:
    enabled: true
    ingressClassName: nginx
    annotations:
      cert-manager.io/cluster-issuer: "letsencrypt-prod"
      nginx.ingress.kubernetes.io/ssl-redirect: "true"
    hosts:
      - vision-ops.xyz
    path: /grafana
    pathType: Prefix
    tls:
      - secretName: vision-ops-tls
        hosts:
          - vision-ops.xyz
  env:
    GF_SERVER_DOMAIN: vision-ops.xyz
    GF_SERVER_ROOT_URL: "https://vision-ops.xyz/grafana/"
    GF_SERVER_SERVE_FROM_SUB_PATH: "true"

alertmanager:
  enabled: false  # Disabled for demos — not needed

nodeExporter:
  enabled: true

kubeStateMetrics:
  enabled: true
