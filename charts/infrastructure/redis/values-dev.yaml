# Redis - Development Environment

architecture: standalone

auth:
  enabled: true
  password: "redis-dev-password"

master:
  persistence:
    enabled: true
    size: 8Gi
    storageClass: "gp3"
  resources:
    limits:
      cpu: 500m
      memory: 1Gi
    requests:
      cpu: 100m
      memory: 256Mi

metrics:
  enabled: true
  serviceMonitor:
    enabled: true

networkPolicy:
  enabled: true
