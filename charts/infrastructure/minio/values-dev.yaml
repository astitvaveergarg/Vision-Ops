# MinIO - Development Environment

mode: standalone

replicas: 1

persistence:
  enabled: true
  size: 50Gi
  storageClass: "gp3"

resources:
  requests:
    memory: 512Mi
    cpu: 250m
  limits:
    memory: 2Gi
    cpu: 1000m

rootUser: minioadmin
rootPassword: minio-dev-secret-key

buckets:
  - name: vision-images-dev
    policy: none
    purge: false

consoleService:
  type: ClusterIP

service:
  type: ClusterIP

ingress:
  enabled: true
  ingressClassName: nginx
  annotations:
    cert-manager.io/cluster-issuer: "letsencrypt-staging"
  hosts:
    - minio-dev.vision.example.com
  tls:
    - secretName: minio-dev-tls
      hosts:
        - minio-dev.vision.example.com

metrics:
  serviceMonitor:
    enabled: true
