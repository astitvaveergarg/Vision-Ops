# Production environment overrides

replicaCount: 3

image:
  repository: astitvaveergarg/vision-api
  pullPolicy: IfNotPresent
  tag: "v1.0.0"  # Use specific versions in production

service:
  type: ClusterIP
  annotations:
    service.beta.kubernetes.io/aws-load-balancer-type: "nlb"
    service.beta.kubernetes.io/aws-load-balancer-cross-zone-load-balancing-enabled: "true"

resources:
  limits:
    cpu: 4000m
    memory: 8Gi
  requests:
    cpu: 1000m
    memory: 2Gi

autoscaling:
  enabled: true
  minReplicas: 3
  maxReplicas: 20
  targetCPUUtilizationPercentage: 60
  targetMemoryUtilizationPercentage: 70

persistence:
  enabled: true
  size: 50Gi
  storageClass: "gp3"

env:
  - name: REDIS_HOST
    value: "redis-master.vision-infra.svc.cluster.local"
  - name: REDIS_PORT
    value: "6379"
  - name: REDIS_PASSWORD
    valueFrom:
      secretKeyRef:
        name: redis-credentials
        key: password
  - name: MINIO_ENDPOINT
    value: "minio.vision-infra.svc.cluster.local:9000"
  - name: MINIO_ACCESS_KEY
    valueFrom:
      secretKeyRef:
        name: minio-credentials
        key: access-key
  - name: MINIO_SECRET_KEY
    valueFrom:
      secretKeyRef:
        name: minio-credentials
        key: secret-key
  - name: MINIO_BUCKET
    value: "vision-images-prod"
  - name: LOG_LEVEL
    value: "WARNING"

ingress:
  enabled: true
  className: "nginx"
  annotations:
    # Private cluster - internal load balancer, accessed via CDN
    service.beta.kubernetes.io/aws-load-balancer-internal: \"true\" # AWS
    service.beta.kubernetes.io/azure-load-balancer-internal: \"true\" # Azure
    nginx.ingress.kubernetes.io/proxy-body-size: \"50m\"
    nginx.ingress.kubernetes.io/rate-limit: \"100\"
    nginx.ingress.kubernetes.io/ssl-redirect: \"true\"
    # Validate custom header from CDN (CloudFront/Front Door)
    nginx.ingress.kubernetes.io/configuration-snippet: |
      if ($http_x_custom_header != \"$CDN_SECRET\") {
        return 403;
      }
  hosts:
    - host: vision-api.internal # Internal hostname, CDN routes to this
      paths:
        - path: /
          pathType: Prefix
  # TLS terminated at CDN edge, not at ingress

serviceMonitor:
  enabled: true
  interval: 15s

podDisruptionBudget:
  enabled: true
  minAvailable: 2

networkPolicy:
  enabled: true

affinity:
  podAntiAffinity:
    requiredDuringSchedulingIgnoredDuringExecution:
      - labelSelector:
          matchExpressions:
            - key: app.kubernetes.io/name
              operator: In
              values:
                - vision-api
        topologyKey: kubernetes.io/hostname
