# Production environment overrides

replicaCount: 3

image:
  repository: ghcr.io/YOUR_USERNAME/vision
  pullPolicy: IfNotPresent
  # Tag should be explicitly set during deployment, never use 'latest' in prod
  tag: "1.0.0"

service:
  type: LoadBalancer
  annotations:
    service.beta.kubernetes.io/aws-load-balancer-type: "nlb"
    service.beta.kubernetes.io/aws-load-balancer-internal: "false"
    service.beta.kubernetes.io/aws-load-balancer-cross-zone-load-balancing-enabled: "true"

resources:
  limits:
    cpu: 4000m
    memory: 8Gi
  requests:
    cpu: 1000m
    memory: 2Gi

autoscaling:
  enabled: true
  minReplicas: 3
  maxReplicas: 20
  targetCPUUtilizationPercentage: 60
  targetMemoryUtilizationPercentage: 70
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
      - type: Percent
        value: 50
        periodSeconds: 60
    scaleUp:
      stabilizationWindowSeconds: 60
      policies:
      - type: Percent
        value: 100
        periodSeconds: 30

persistence:
  enabled: true
  size: 50Gi
  storageClass: "gp3"
  annotations:
    backup.velero.io/backup-volumes: "models-cache"

env:
  - name: LOG_LEVEL
    value: "WARNING"
  - name: DEFAULT_MODEL_ID
    value: "yolov8m"
  - name: CACHE_TTL
    value: "3600"
  - name: MAX_WORKERS
    value: "4"

ingress:
  enabled: true
  className: "nginx"
  annotations:
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    nginx.ingress.kubernetes.io/rate-limit: "200"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: "50m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "300"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "300"
  hosts:
    - host: api.visionops.com
      paths:
        - path: /
          pathType: Prefix
  tls:
    - secretName: vision-api-prod-tls
      hosts:
        - api.visionops.com

serviceMonitor:
  enabled: true
  interval: 15s
  scrapeTimeout: 10s

podDisruptionBudget:
  enabled: true
  minAvailable: 2

networkPolicy:
  enabled: true

affinity:
  podAntiAffinity:
    requiredDuringSchedulingIgnoredDuringExecution:
      - labelSelector:
          matchExpressions:
            - key: app
              operator: In
              values:
                - vision-api
        topologyKey: "kubernetes.io/hostname"
  nodeAffinity:
    preferredDuringSchedulingIgnoredDuringExecution:
      - weight: 100
        preference:
          matchExpressions:
            - key: node.kubernetes.io/instance-type
              operator: In
              values:
                - c5.2xlarge
                - c5.4xlarge

tolerations:
  - key: "workload"
    operator: "Equal"
    value: "ml-inference"
    effect: "NoSchedule"

# Production-specific labels
podLabels:
  environment: production
  tier: api
  monitoring: enabled
