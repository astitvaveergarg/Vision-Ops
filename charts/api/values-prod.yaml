# Production environment overrides

replicaCount: 3

image:
  repository: astitvaveergarg/vision-api
  pullPolicy: IfNotPresent
  tag: "v1.0.0"  # Use specific versions in production

service:
  type: ClusterIP
  annotations: {}

resources:
  limits:
    cpu: 4000m
    memory: 8Gi
  requests:
    cpu: 1000m
    memory: 2Gi

autoscaling:
  enabled: true
  minReplicas: 3
  maxReplicas: 20
  targetCPUUtilizationPercentage: 60
  targetMemoryUtilizationPercentage: 70

persistence:
  enabled: true
  size: 50Gi
  storageClass: "premium-rwo"

env:
  - name: REDIS_HOST
    value: "redis-master.vision-infra.svc.cluster.local"
  - name: REDIS_PORT
    value: "6379"
  - name: REDIS_PASSWORD
    valueFrom:
      secretKeyRef:
        name: vision-redis-credentials
        key: password
  - name: MINIO_ENDPOINT
    value: "minio.vision-infra.svc.cluster.local:9000"
  - name: MINIO_ACCESS_KEY
    valueFrom:
      secretKeyRef:
        name: vision-minio-credentials
        key: rootUser
  - name: MINIO_SECRET_KEY
    valueFrom:
      secretKeyRef:
        name: vision-minio-credentials
        key: rootPassword
  - name: MINIO_BUCKET
    value: "vision-images-prod"
  - name: LOG_LEVEL
    value: "WARNING"

ingress:
  enabled: false

serviceMonitor:
  enabled: true
  interval: 15s

podDisruptionBudget:
  enabled: true
  minAvailable: 2

networkPolicy:
  enabled: true

affinity:
  podAntiAffinity:
    requiredDuringSchedulingIgnoredDuringExecution:
      - labelSelector:
          matchExpressions:
            - key: app.kubernetes.io/name
              operator: In
              values:
                - vision-api
        topologyKey: kubernetes.io/hostname
