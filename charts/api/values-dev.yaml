# Development environment overrides

replicaCount: 1

image:
  repository: astitvaveergarg/vision-api
  pullPolicy: Always
  tag: "latest"

service:
  type: ClusterIP
  annotations: {}

resources:
  limits:
    cpu: 2000m
    memory: 4Gi
  requests:
    cpu: 500m
    memory: 1Gi

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 5
  targetCPUUtilizationPercentage: 70

persistence:
  enabled: true
  size: 10Gi
  storageClass: "standard"

env:
  - name: REDIS_HOST
    value: "redis-master.vision-infra.svc.cluster.local"
  - name: REDIS_PORT
    value: "6379"
  - name: MINIO_ENDPOINT
    value: "minio.vision-infra.svc.cluster.local:9000"
  - name: REDIS_PASSWORD
    valueFrom:
      secretKeyRef:
        name: vision-redis-credentials
        key: password
  - name: MINIO_ACCESS_KEY
    valueFrom:
      secretKeyRef:
        name: vision-minio-credentials
        key: rootUser
  - name: MINIO_SECRET_KEY
    valueFrom:
      secretKeyRef:
        name: vision-minio-credentials
        key: rootPassword
  - name: MINIO_BUCKET
    value: "vision-images-dev"
  - name: LOG_LEVEL
    value: "INFO"
  - name: ROOT_PATH
    value: "/api"

ingress:
  enabled: true
  className: nginx
  annotations:
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/rewrite-target: /$2
  hosts:
    - host: vision-ops.xyz
      paths:
        - path: /api(/|$)(.*)
          pathType: ImplementationSpecific
  tls:
    - secretName: vision-ops-tls
      hosts:
        - vision-ops.xyz

serviceMonitor:
  enabled: true
  interval: 30s

podDisruptionBudget:
  enabled: false  # Disabled: incompatible with 1 replica + scale-to-zero

networkPolicy:
  enabled: false

# Node placement — schedule on ML node pool
nodeSelector:
  role: ml  # Matches terraform label in ml_node_pool

# Preferred (not required) anti-affinity — works with scale-to-zero
affinity: {}

tolerations: []
