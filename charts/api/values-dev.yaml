# Development environment overrides

replicaCount: 1

image:
  repository: astitvaveergarg/vision-api
  pullPolicy: Always
  tag: "latest"

service:
  type: ClusterIP
  annotations: {}

resources:
  limits:
    cpu: 2000m
    memory: 4Gi
  requests:
    cpu: 500m
    memory: 1Gi

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 5
  targetCPUUtilizationPercentage: 70

persistence:
  enabled: true
  size: 10Gi
  storageClass: "standard"

env:
  - name: REDIS_HOST
    value: "redis-master.vision-infra.svc.cluster.local"
  - name: REDIS_PORT
    value: "6379"
  - name: MINIO_ENDPOINT
    value: "minio.vision-infra.svc.cluster.local:9000"
  - name: REDIS_PASSWORD
    valueFrom:
      secretKeyRef:
        name: vision-redis-credentials
        key: password
  - name: MINIO_ACCESS_KEY
    valueFrom:
      secretKeyRef:
        name: vision-minio-credentials
        key: rootUser
  - name: MINIO_SECRET_KEY
    valueFrom:
      secretKeyRef:
        name: vision-minio-credentials
        key: rootPassword
  - name: MINIO_BUCKET
    value: "vision-images-dev"
  - name: LOG_LEVEL
    value: "INFO"

ingress:
  enabled: false

serviceMonitor:
  enabled: true
  interval: 30s

podDisruptionBudget:
  enabled: true
  minAvailable: 1

networkPolicy:
  enabled: false
