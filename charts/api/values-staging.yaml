# Staging environment overrides

replicaCount: 2

image:
  repository: ghcr.io/YOUR_USERNAME/vision
  pullPolicy: IfNotPresent
  tag: "stable"

service:
  type: LoadBalancer
  annotations:
    service.beta.kubernetes.io/aws-load-balancer-type: "nlb"
    service.beta.kubernetes.io/aws-load-balancer-internal: "false"

resources:
  limits:
    cpu: 2000m
    memory: 4Gi
  requests:
    cpu: 750m
    memory: 2Gi

autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 8
  targetCPUUtilizationPercentage: 70
  targetMemoryUtilizationPercentage: 80

persistence:
  enabled: true
  size: 20Gi
  storageClass: "gp3"

env:
  - name: LOG_LEVEL
    value: "INFO"
  - name: DEFAULT_MODEL_ID
    value: "yolov8s"
  - name: CACHE_TTL
    value: "7200"

ingress:
  enabled: true
  className: "nginx"
  annotations:
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    nginx.ingress.kubernetes.io/rate-limit: "100"
  hosts:
    - host: api-staging.visionops.com
      paths:
        - path: /
          pathType: Prefix
  tls:
    - secretName: vision-api-staging-tls
      hosts:
        - api-staging.visionops.com

serviceMonitor:
  enabled: true

podDisruptionBudget:
  enabled: true
  minAvailable: 1

networkPolicy:
  enabled: true
