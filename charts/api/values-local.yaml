# Local development overrides (Minikube)

replicaCount: 1

image:
  repository: astitvaveergarg/vision-api
  pullPolicy: IfNotPresent
  tag: "cpu-latest"

service:
  type: NodePort
  nodePort: 30800

resources:
  limits:
    cpu: 1000m
    memory: 2Gi
  requests:
    cpu: 250m
    memory: 512Mi

autoscaling:
  enabled: false

persistence:
  enabled: false

env:
  - name: REDIS_HOST
    value: "redis-master.vision-infra.svc.cluster.local"
  - name: REDIS_PORT
    value: "6379"
  - name: REDIS_PASSWORD
    valueFrom:
      secretKeyRef:
        name: vision-redis-credentials
        key: password
  - name: MINIO_ENDPOINT
    value: "minio.vision-infra.svc.cluster.local:9000"
  - name: MINIO_ACCESS_KEY
    valueFrom:
      secretKeyRef:
        name: vision-minio-credentials
        key: rootUser
  - name: MINIO_SECRET_KEY
    valueFrom:
      secretKeyRef:
        name: vision-minio-credentials
        key: rootPassword
  - name: MINIO_BUCKET
    value: "vision-images"
  - name: LOG_LEVEL
    value: "DEBUG"

ingress:
  enabled: false

serviceMonitor:
  enabled: false

podDisruptionBudget:
  enabled: false

networkPolicy:
  enabled: false
